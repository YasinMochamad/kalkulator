spring.application.name=calculator
server.port=8080

# ============================================================
# BNI STANDARD RESPONSE CODE CONFIGURATION
# ============================================================
# Format responseCode: [HTTP_STATUS_3digit][project_order_2digit][api_order_2digit]
# Contoh: 2000101 = HTTP 200, project ke-01, api ke-01
# Ubah nilai ini sesuai urutan project di lingkungan BNI
app.project-order=01

# ============================================================
# LOGGING CONFIGURATION
# ============================================================
logging.level.root=INFO
logging.level.id.co.bni=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.web.servlet.DispatcherServlet=DEBUG
logging.config=classpath:logback-spring.xml
spring.output.ansi.enabled=ALWAYS
