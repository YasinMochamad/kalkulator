name: CI - Kalkulator Spring Boot

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Build Spring Boot
  # ─────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build dengan Maven (skip test)
        run: mvn clean package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 7

  # ─────────────────────────────────────────
  # JOB 2: Run Aplikasi + Newman
  # ─────────────────────────────────────────
  run:
    name: Run Application & Newman Test
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Run application in background
        run: |
          java -jar target/*.jar &
          echo "Waiting for application to start..."
          sleep 20

      - name: Health check
        run: |
          for i in 1 2 3 4 5; do
            if curl -f http://localhost:8080/actuator/health 2>/dev/null; then
              echo "App is up!"
              break
            else
              echo "Attempt $i failed, retrying..."
              sleep 10
            fi
          done

      - name: Install Newman + HTML Reporter
        run: npm install -g newman newman-reporter-htmlextra

      - name: Run Newman Collection
        run: |
          mkdir -p newman-reports
          newman run collections/calculator_newman_chain_v3.json \
            --environment collections/calculator_newman_chain_env_v2.json \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export newman-reports/newman-report.html \
            --reporter-htmlextra-title "Kalkulator API Test Report" || true

      - name: Upload Newman Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: newman-report
          path: newman-reports/newman-report.html
          retention-days: 7

  # ─────────────────────────────────────────
  # JOB 3: Notifikasi Telegram - SUKSES
  # ─────────────────────────────────────────
  telegram-success:
    name: Notify Telegram (Success)
    runs-on: ubuntu-latest
    needs: [build, run]
    if: |
      always() &&
      needs.build.result == 'success' &&
      needs.run.result == 'success'
    steps:
      - name: Send success to Telegram
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          ACTOR="${{ github.actor }}"
          BRANCH="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          MESSAGE="✅ *CI PASSED - Kalkulator*%0A%0A🗂 *Repo:* [${REPO}](${REPO_URL})%0A🌿 *Branch:* ${BRANCH}%0A👤 *Pushed by:* ${ACTOR}%0A🔖 *Commit:* \`${SHORT_SHA}\` — ${COMMIT_MSG}%0A%0A✅ Build: SUKSES%0A✅ Run: SUKSES%0A✅ Newman: SUKSES%0A%0A🔗 [Lihat pipeline](${RUN_URL})%0A📊 *Newman report:* Download dari Artifacts di pipeline"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "parse_mode=Markdown" \
            -d "text=${MESSAGE}"

  # ─────────────────────────────────────────
  # JOB 4: Notifikasi Telegram - GAGAL
  # ─────────────────────────────────────────
  telegram-failure:
    name: Notify Telegram (Failure)
    runs-on: ubuntu-latest
    needs: [build, run]
    if: |
      always() &&
      (needs.build.result == 'failure' ||
       needs.run.result == 'failure')
    steps:
      - name: Send failure to Telegram
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          ACTOR="${{ github.actor }}"
          BRANCH="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          FAILED_JOBS=""
          add_failed() { if [ -n "$FAILED_JOBS" ]; then FAILED_JOBS="${FAILED_JOBS}, $1"; else FAILED_JOBS="$1"; fi }
          [ "${{ needs.build.result }}" = "failure" ] && add_failed "Build"
          [ "${{ needs.run.result }}"   = "failure" ] && add_failed "Run & Newman"

          MESSAGE="❌ *CI FAILED - Kalkulator*%0A%0A🗂 *Repo:* [${REPO}](${REPO_URL})%0A🌿 *Branch:* ${BRANCH}%0A👤 *Pushed by:* ${ACTOR}%0A🔖 *Commit:* \`${SHORT_SHA}\` — ${COMMIT_MSG}%0A💥 *Job gagal:* ${FAILED_JOBS}%0A🔗 [Lihat log error](${RUN_URL})"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "parse_mode=Markdown" \
            -d "text=${MESSAGE}"
